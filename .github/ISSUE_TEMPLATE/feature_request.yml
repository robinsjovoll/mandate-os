name: Feature request
description: Suggest an improvement for the public MandateOS repo
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Suggestions are most helpful when they stay within the public repo boundary:
        SDK, MCP tooling, OpenClaw integration, installers, docs, examples, or homepage.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or friction clearly.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share other approaches you tried or considered.
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Examples, references, or related issues.
