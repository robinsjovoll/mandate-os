<svg width="1480" height="920" viewBox="0 0 1480 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MandateOS approval and evidence preview</title>
  <desc id="desc">A representative MandateOS product preview showing a requested production action, approval review details, and signed receipt verification.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1380" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1B2A"/>
      <stop offset="1" stop-color="#07111B"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#102235"/>
      <stop offset="1" stop-color="#091521"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#83E3E0"/>
      <stop offset="1" stop-color="#4E91FF"/>
    </linearGradient>
    <linearGradient id="warning" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD37F"/>
      <stop offset="1" stop-color="#FF9A3D"/>
    </linearGradient>
  </defs>

  <rect width="1480" height="920" rx="40" fill="#050D14"/>
  <circle cx="210" cy="126" r="180" fill="#FF9A3D" opacity="0.14"/>
  <circle cx="1230" cy="180" r="210" fill="#83E3E0" opacity="0.1"/>
  <circle cx="1110" cy="770" r="260" fill="#C7FF9D" opacity="0.05"/>

  <rect x="40" y="40" width="1400" height="840" rx="34" fill="url(#bg)" stroke="#1E394E"/>
  <rect x="68" y="68" width="1344" height="72" rx="22" fill="#0B1723" stroke="#193144"/>

  <circle cx="104" cy="104" r="7" fill="#FF7A67"/>
  <circle cx="128" cy="104" r="7" fill="#FFD37F"/>
  <circle cx="152" cy="104" r="7" fill="#83E3E0"/>

  <text x="188" y="109" fill="#EEF6FF" font-family="Space Grotesk, system-ui, sans-serif" font-size="27" font-weight="700">MandateOS / operator review and evidence</text>
  <text x="1058" y="109" fill="#A0B5C9" font-family="IBM Plex Mono, Menlo, monospace" font-size="18">workspace robin-labs</text>

  <rect x="86" y="170" width="214" height="36" rx="18" fill="#102235" stroke="#21435B"/>
  <text x="107" y="193" fill="#83E3E0" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" font-weight="600">Codex / runtime guardrail</text>

  <rect x="314" y="170" width="242" height="36" rx="18" fill="#151D14" stroke="#2F4B35"/>
  <text x="336" y="193" fill="#C7FF9D" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" font-weight="600">signed receipt / verified</text>

  <rect x="570" y="170" width="250" height="36" rx="18" fill="#2A1D0D" stroke="#5B4020"/>
  <text x="592" y="193" fill="#FFD37F" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" font-weight="600">approval required / operator inbox</text>

  <rect x="86" y="232" width="412" height="520" rx="28" fill="url(#panel)" stroke="#183246"/>
  <rect x="534" y="232" width="412" height="520" rx="28" fill="url(#panel)" stroke="#183246"/>
  <rect x="982" y="232" width="412" height="520" rx="28" fill="url(#panel)" stroke="#183246"/>

  <text x="118" y="279" fill="#FF9A3D" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700" letter-spacing="1.8">REQUESTED ACTION</text>
  <text x="118" y="322" fill="#EEF6FF" font-family="Space Grotesk, system-ui, sans-serif" font-size="34" font-weight="700">Agent request reaches</text>
  <text x="118" y="360" fill="#EEF6FF" font-family="Space Grotesk, system-ui, sans-serif" font-size="34" font-weight="700">MandateOS before it runs</text>
  <text x="118" y="402" fill="#A0B5C9" font-family="Space Grotesk, system-ui, sans-serif" font-size="19">The host, repo, mandate id, and risk</text>
  <text x="118" y="430" fill="#A0B5C9" font-family="Space Grotesk, system-ui, sans-serif" font-size="19">context are visible before the shell</text>
  <text x="118" y="458" fill="#A0B5C9" font-family="Space Grotesk, system-ui, sans-serif" font-size="19">or external tool continues.</text>

  <rect x="118" y="494" width="348" height="80" rx="18" fill="#07111B" stroke="#1D384C"/>
  <text x="144" y="524" fill="#83E3E0" font-family="IBM Plex Mono, Menlo, monospace" font-size="15">command</text>
  <text x="144" y="556" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="19" font-weight="600">pnpm db:migrate --env prod</text>

  <rect x="118" y="592" width="166" height="72" rx="16" fill="#0B1723" stroke="#1D384C"/>
  <text x="138" y="619" fill="#A0B5C9" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">host</text>
  <text x="138" y="650" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" font-weight="600">codex.PreToolUse</text>

  <rect x="300" y="592" width="166" height="72" rx="16" fill="#0B1723" stroke="#1D384C"/>
  <text x="320" y="619" fill="#A0B5C9" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">mandate</text>
  <text x="320" y="650" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" font-weight="600">mdt_prod_guard</text>

  <rect x="118" y="682" width="166" height="72" rx="16" fill="#0B1723" stroke="#1D384C"/>
  <text x="138" y="709" fill="#A0B5C9" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">zone</text>
  <text x="138" y="740" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" font-weight="600">production / oecd</text>

  <rect x="300" y="682" width="166" height="72" rx="16" fill="#2A1D0D" stroke="#5B4020"/>
  <text x="320" y="709" fill="#A0B5C9" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">risk</text>
  <text x="320" y="740" fill="#FFD37F" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" font-weight="600">high / approval</text>

  <text x="118" y="770" fill="#A0B5C9" font-family="IBM Plex Mono, Menlo, monospace" font-size="15">repo /srv/payments-api    request req_4c91d02</text>

  <text x="566" y="279" fill="#FF9A3D" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700" letter-spacing="1.8">APPROVAL EVENT</text>
  <text x="566" y="322" fill="#EEF6FF" font-family="Space Grotesk, system-ui, sans-serif" font-size="34" font-weight="700">Operator sees the exact</text>
  <text x="566" y="360" fill="#EEF6FF" font-family="Space Grotesk, system-ui, sans-serif" font-size="34" font-weight="700">request and escalation path</text>
  <text x="566" y="402" fill="#A0B5C9" font-family="Space Grotesk, system-ui, sans-serif" font-size="19">Approval is not a vague chat message.</text>
  <text x="566" y="430" fill="#A0B5C9" font-family="Space Grotesk, system-ui, sans-serif" font-size="19">The inbox shows what was asked, why it</text>
  <text x="566" y="458" fill="#A0B5C9" font-family="Space Grotesk, system-ui, sans-serif" font-size="19">stopped, and what an operator can approve.</text>

  <rect x="566" y="494" width="348" height="44" rx="14" fill="#2A1D0D" stroke="#5B4020"/>
  <text x="590" y="522" fill="#FFD37F" font-family="IBM Plex Mono, Menlo, monospace" font-size="16" font-weight="700">WAITING FOR REVIEW / production migration</text>

  <rect x="566" y="556" width="348" height="172" rx="18" fill="#07111B" stroke="#1D384C"/>
  <text x="590" y="588" fill="#A0B5C9" font-family="IBM Plex Mono, Menlo, monospace" font-size="15">summary</text>
  <text x="590" y="624" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="18">Tool scope matched the mandate,</text>
  <text x="590" y="652" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="18">but this command crosses the</text>
  <text x="590" y="680" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="18">approval threshold for prod work.</text>

  <rect x="566" y="746" width="164" height="44" rx="14" fill="#102235" stroke="#21435B"/>
  <text x="592" y="774" fill="#83E3E0" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" font-weight="600">approval apr_18b702</text>

  <rect x="748" y="746" width="166" height="44" rx="14" fill="#151D14" stroke="#2F4B35"/>
  <text x="774" y="774" fill="#C7FF9D" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" font-weight="600">operator robin-labs</text>

  <text x="1014" y="279" fill="#FF9A3D" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700" letter-spacing="1.8">RECEIPT AND VERIFICATION</text>
  <text x="1014" y="322" fill="#EEF6FF" font-family="Space Grotesk, system-ui, sans-serif" font-size="32" font-weight="700">Signed evidence</text>
  <text x="1014" y="356" fill="#EEF6FF" font-family="Space Grotesk, system-ui, sans-serif" font-size="32" font-weight="700">stays attached</text>
  <text x="1014" y="390" fill="#EEF6FF" font-family="Space Grotesk, system-ui, sans-serif" font-size="32" font-weight="700">to the action</text>
  <text x="1014" y="432" fill="#A0B5C9" font-family="Space Grotesk, system-ui, sans-serif" font-size="19">Review the receipt and</text>
  <text x="1014" y="460" fill="#A0B5C9" font-family="Space Grotesk, system-ui, sans-serif" font-size="19">approval event with the</text>
  <text x="1014" y="488" fill="#A0B5C9" font-family="Space Grotesk, system-ui, sans-serif" font-size="19">grant and audit status.</text>

  <rect x="1014" y="524" width="348" height="184" rx="18" fill="#07111B" stroke="#1D384C"/>
  <rect x="1038" y="550" width="112" height="34" rx="12" fill="url(#accent)"/>
  <text x="1065" y="572" fill="#06131F" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" font-weight="700">SIGNED</text>
  <rect x="1164" y="550" width="126" height="34" rx="12" fill="#151D14" stroke="#2F4B35"/>
  <text x="1192" y="572" fill="#C7FF9D" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" font-weight="700">VERIFIED</text>

  <text x="1038" y="606" fill="#A0B5C9" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">receipt</text>
  <text x="1038" y="634" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" font-weight="600">rcpt_9a7b2d441e1c</text>

  <text x="1038" y="664" fill="#A0B5C9" font-family="IBM Plex Mono, Menlo, monospace" font-size="14">decision</text>
  <text x="1038" y="692" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" font-weight="600">approval then executed with grant</text>

  <rect x="1014" y="724" width="348" height="44" rx="14" fill="#102235" stroke="#21435B"/>
  <text x="1038" y="752" fill="#83E3E0" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" font-weight="600">audit chain verified / execution grant grt_aa3021</text>

  <rect x="86" y="786" width="1308" height="60" rx="22" fill="#08121C" stroke="#173044"/>
  <circle cx="128" cy="816" r="12" fill="#83E3E0"/>
  <text x="153" y="821" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="16" font-weight="600">1. request intercepted</text>
  <circle cx="460" cy="816" r="12" fill="#FFD37F"/>
  <text x="485" y="821" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="16" font-weight="600">2. operator review created</text>
  <circle cx="838" cy="816" r="12" fill="#4E91FF"/>
  <text x="863" y="821" fill="#EEF6FF" font-family="IBM Plex Mono, Menlo, monospace" font-size="16" font-weight="600">3. receipt signed and verified</text>
  <text x="1190" y="821" fill="#A0B5C9" font-family="IBM Plex Mono, Menlo, monospace" font-size="15">approval events / receipts / audit chain</text>
</svg>
